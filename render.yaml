# פריסה ב-Render: https://render.com
# New → Blueprint → חבר repo (אחרי push ל-GitHub)
# חינם = שירות "נרדם" אחרי חוסר פעילות (~30 שניות התעוררות). ל-TestFlight זה בסדר להתחלה.
# לחנות: שדרג ל-Starter ($7/חודש) — Always On

services:
  - type: web
    name: sikret-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
