# פריסה ב-Render: https://render.com
# Starter + persistent disk — data survives redeploys

services:
  - type: web
    name: sikret-api
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: sikret-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /var/data
